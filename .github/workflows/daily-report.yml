name: Daily Options Report

on:
  schedule:
    # 6:00 AM PT (America/Los_Angeles) = 1:00 PM UTC, weekdays only
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-and-email:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_report.py

      - name: Get report info
        id: report
        run: |
          DATE=$(date +%Y-%m-%d)
          REPORT_FILE="reports/${DATE}.md"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "Report file not found: $REPORT_FILE"
            exit 1
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/blob/main/$REPORT_FILE" >> $GITHUB_OUTPUT

      - name: Commit and push report
        run: |
          git config user.name "Options Report Bot"
          git config user.email "actions@github.com"
          git add reports/ README.md
          git commit -m "Daily options report ${{ steps.report.outputs.date }}" || echo "Nothing to commit"
          git push origin main

      - name: Build email body
        run: |
          REPORT_FILE="${{ steps.report.outputs.file }}"
          REPORT_DATE="${{ steps.report.outputs.date }}"
          REPORT_URL="${{ steps.report.outputs.url }}"

          cat > /tmp/email_body.html << HTMLEOF
          <html><body>
          <h2>📊 每日選擇權策略報告 — ${REPORT_DATE}</h2>
          <p><strong>標的：</strong>TSLA, AMZN, NVDA</p>
          <hr>
          <h3>🔗 閱讀完整報告</h3>
          <p><a href="${REPORT_URL}">👉 點此在 GitHub 上閱讀完整報告（含表格）</a></p>
          <hr>
          <h3>📋 報告摘要</h3>
          <pre>
          HTMLEOF

          if grep -q "最終總結" "$REPORT_FILE"; then
            sed -n '/最終總結/,$p' "$REPORT_FILE" >> /tmp/email_body.html
          else
            head -100 "$REPORT_FILE" >> /tmp/email_body.html
          fi

          cat >> /tmp/email_body.html << 'HTMLEOF'
          </pre>
          <hr>
          <p><em>此報告由 GitHub Actions 自動產生並寄送。</em></p>
          </body></html>
          HTMLEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: laiyanlong@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📊 選擇權日報 ${{ steps.report.outputs.date }} — TSLA / AMZN / NVDA"
          to: laiyanlong@gmail.com
          from: "Options Report Bot <laiyanlong@gmail.com>"
          html_body: file:///tmp/email_body.html
