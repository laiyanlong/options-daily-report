services:
  report:
    build: .
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REPORT_LANG=${REPORT_LANG:-zh}
      - REPORT_DATE=${REPORT_DATE:-}
      - TICKERS=${TICKERS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./reports:/app/reports
